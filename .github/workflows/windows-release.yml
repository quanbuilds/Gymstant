name: Windows release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run pack:win:portable
      - uses: actions/upload-artifact@v4
        with:
          name: Gymstant-Windows
          path: release/Gymstant-*-Windows.exe
          if-no-files-found: error
      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: release/Gymstant-*-Windows.exe
          generate_release_notes: true
          body: |
            Free Windows early-access build of Gymstant.

            Gymstant's workflow capture, Review, Monitor, local memory, and privacy-protected screenshot features work without a paid account. AI chat requires a local OpenAI-compatible endpoint at 127.0.0.1:8899. Desktop actions require Hermes Agent and appropriate Windows permissions.