name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run pack:win:portable
      - uses: actions/upload-artifact@v4
        with:
          name: Gymstant-Windows
          path: release/Gymstant-*-Windows.exe
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run pack:mac:zip
      - uses: actions/upload-artifact@v4
        with:
          name: Gymstant-macOS
          path: release/Gymstant-*-macOS.zip
          if-no-files-found: error

  publish:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: Gymstant-Windows
          path: release
      - uses: actions/download-artifact@v4
        with:
          name: Gymstant-macOS
          path: release
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            release/Gymstant-*-Windows.exe
            release/Gymstant-*-macOS.zip
          generate_release_notes: true
          body: |
            Free early-access build of Gymstant for Windows and macOS.

            Gymstant's workflow capture, Review, Monitor, local memory, and privacy-protected screenshot features work without a paid account. AI chat requires a local OpenAI-compatible endpoint at 127.0.0.1:8899. Desktop actions require Hermes Agent and appropriate OS permissions.

            **macOS:** this build is not signed or notarized. After unzipping, right-click (or Control-click) Gymstant.app and choose "Open," then confirm "Open" in the Gatekeeper dialog — required once. If macOS still blocks it, open System Settings → Privacy & Security and click "Open Anyway" next to Gymstant.

            **Windows:** if SmartScreen warns Gymstant is unrecognized, click "More info" → "Run anyway." Expected for an unsigned early-access build.
