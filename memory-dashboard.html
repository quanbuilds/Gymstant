<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Gymstant Memory</title><style>
:root{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#eef1f6;background:#10141b}*{box-sizing:border-box}body{margin:0;background:#10141b}button{font:inherit}.app{display:grid;grid-template-columns:250px 1fr;min-height:100vh}.side{padding:24px 16px;background:#0b0f15}.nav{display:flex;flex-direction:column;gap:5px}.nav button{border:0;background:transparent;color:#aeb7c5;text-align:left;padding:11px;border-radius:10px}.nav button.active,.nav button:hover{background:#ffffff12;color:white}.main{padding:30px}.head{display:flex;justify-content:space-between;margin-bottom:18px}.panel{background:#151b24;border:1px solid #ffffff18;border-radius:18px;padding:24px}.prose{min-height:55vh;line-height:1.72;font-size:15px;outline:none}.prose p{max-width:78ch;margin:0 0 18px}.memory-item{padding:14px 0;border-bottom:1px solid #ffffff12}.memory-item h3{margin:0 0 7px}.list{display:grid;gap:8px}.item{padding:14px;background:#ffffff08;border-radius:12px;cursor:pointer}.log{white-space:pre-wrap;background:#070a0f;color:#bce8c8;padding:18px;border-radius:12px;font:12px/1.5 ui-monospace,Menlo,monospace;min-height:55vh}.actions{display:flex;gap:8px}.actions button{padding:9px 14px}.status,.sub,small{color:#94a0b2}.empty{padding:30px;color:#94a0b2}@media(max-width:700px){.app{grid-template-columns:1fr}.nav{flex-direction:row;overflow:auto}}
</style></head><body><div class="app"><aside class="side"><h1>Gymstant Memory</h1><p class="sub">Readable, local, and under your control.</p><div class="nav" id="nav"></div></aside><main class="main"><div class="head"><h2 id="title">Overview</h2><span class="status" id="status">Local to this computer</span></div><section class="panel" id="content"></section></main></div><script>
let data,selection={kind:'overview'};const nav=document.getElementById('nav'),content=document.getElementById('content'),title=document.getElementById('title'),status=document.getElementById('status');const sections=[['overview','Overview'],['workflows','Workflows'],['conversations','Conversations'],['MEMORY.md','Workflow memory'],['MEMORY_GUIDE.md','Memory guide'],['users.md','Staff members'],['employee.md','Gymstant employee role'],['screenshots','Screenshots'],['logs','Technical log']];
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
async function load(){data=await(await fetch('/api/data')).json();renderNav();render()}
function renderNav(){nav.innerHTML=sections.map(([id,label])=>`<button data-id="${id}" class="${selection.kind===id?'active':''}">${label}</button>`).join('');nav.querySelectorAll('button').forEach(b=>b.onclick=()=>{selection={kind:b.dataset.id};renderNav();render()})}
function paras(v){return String(v||'').replace(/^#{1,6}\s*/gm,'').replace(/\*\*/g,'').replace(/^[-*]\s+/gm,'').split(/\n\s*\n/).filter(Boolean).map(p=>`<p>${esc(p.replace(/\n+/g,' '))}</p>`).join('')}
function editor(kind,id,value){return `<div class="prose" id="editor" contenteditable="true">${paras(value)}</div><div class="actions"><button onclick="save('${kind}','${id}')">Save changes</button><button onclick="load()">Discard changes</button></div>`}
function wf(w){return `<div class="memory-item"><h3>${esc(w.title||'Saved workflow')}</h3><p>Gymstant uses ${esc(w.app||'the client software')} for this workflow. It is ${esc(w.status||'saved')} with ${esc(typeof w.steps==='number'?w.steps:(w.steps||[]).length)} recorded steps. ${esc(w.detail||'')} Its confidence is ${esc(w.confidence||'not yet measured')} percent.</p></div>`}
function render(){const k=selection.kind;title.textContent=sections.find(x=>x[0]===k)?.[1]||selection.title||'Memory';if(k==='overview'){content.innerHTML=`<div class="prose"><p>Gymstant currently remembers ${data.workflows.length} workflows, ${data.conversations.length} conversations, and ${data.screenshots.length} supporting screenshots. Everything here is stored locally and can be reviewed by staff.</p></div>`}else if(k==='workflows'){content.innerHTML=`<div class="prose">${data.workflows.map(wf).join('')||'<p>No workflows have been saved yet.</p>'}</div>`}else if(k==='conversations'){content.innerHTML=`<div class="list">${data.conversations.map((c,i)=>`<div class="item" onclick="openConversation(${i})"><b>${esc(c.title)}</b><small>${c.messages.length} messages</small></div>`).join('')||'<div class="empty">No conversations saved yet.</div>'}</div>`}else if(data.markdown[k]!=null){content.innerHTML=editor('markdown',k,data.markdown[k])}else if(k==='screenshots'){content.innerHTML=`<div class="prose"><p>${data.screenshots.length?data.screenshots.map(esc).join('. '):'No screenshots captured yet.'}</p></div>`}else if(k==='logs'){content.innerHTML=`<pre class="log">${esc(data.logs)}</pre>`}}
function openConversation(i){const c=data.conversations[i];selection={kind:'conversation',title:c.title};renderNav();title.textContent=c.title;content.innerHTML=`<div class="prose">${c.messages.map(m=>`<div class="memory-item"><h3>${m.role==='user'?'Staff member':'Gymstant'}</h3><p>${esc(m.content)}</p></div>`).join('')}</div>`}
async function save(kind,id){status.textContent='Saving…';const response=await fetch('/api/save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({kind,id,content:editorEl().innerText})});const result=await response.json();status.textContent=result.ok?'Saved on this computer':result.error||'Could not save';if(result.ok)await load()}
function editorEl(){return document.getElementById('editor')}load();
</script></body></html>
